<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket ka junson</title> 

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #050a1f;
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

/* Profile */
.profile img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 3px solid transparent;
    background: linear-gradient(#000, #000) padding-box,
                linear-gradient(45deg, #00eaff, #ff00ff) border-box;
    padding: 3px;
    object-fit: cover;
}

h1 {
    margin: 10px 0;
}

.followers {
    color: #00eaff;
    font-size: 18px;
}

/* Cards */
.cards {
    display: flex;
    justify-content: space-around;
    margin: 20px 0;
}

.card {
    background: #0d1333;
    padding: 15px;
    border-radius: 15px;
    width: 30%;
}

.card h2 {
    color: #00eaff;
}

/* Button */
.telegram-btn {
    display: block;
    margin: 20px auto;
    padding: 15px;
    width: 90%;
    border-radius: 30px;
    background: linear-gradient(90deg, #00eaff, #ff00ff);
    color: white;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
}

/* Timer */
.timer {
    background: #0d1333;
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}

.time-box {
    display: flex;
    justify-content: space-around;
    margin-top: 10px;
}

.time-box div {
    font-size: 20px;
}

/* Section */
.section {
    background: #0d1333;
    margin-top: 20px;
    padding: 15px;
    border-radius: 15px;
    text-align: left;
}
</style>

</head>

<body>

<div class="container">

    <!-- PROFILE -->
    <div class="profile">
        <!-- 👉 sneha--> 
        <img src="sneha.jpg" alt="profile"> 
        <h1>sneha cricket</h1> 
        <div class="followers">40k+ Followers</div> 
    </div>

    <!-- STATS -->
    <div class="cards">
        <div class="card">
            <h2>70k+</h2>
            <p>Subscribers</p>
        </div>
        <div class="card">
            <h2>1,547</h2>
            <p>Predictions</p>
        </div>
        <div class="card">
            <h2>94%</h2>
            <p>Accuracy</p>
        </div>
    </div>

    <!-- BUTTON -->
    <a href="https://t.me/+rz8BdL9_A2kwODBl" class="telegram-btn"> 
        Join Telegram Channel
    </a>

    <!-- TIMER -->
    <div class="timer">
        <h3>Next Prediction In</h3>
        <div class="time-box">
            <div><span id="days">00</span><br>Days</div>
            <div><span id="hours">00</span><br>Hours</div>
            <div><span id="minutes">00</span><br>Minutes</div>
            <div><span id="seconds">00</span><br>Seconds</div>
        </div>
    </div>

    <!-- SECTION -->
    <div class="section">
        <h3>Pre-match Predictions</h3>
        <p>Daily expert analysis before matches start with high win rate predictions.</p>
    </div>

</div>

<!-- SCRIPT (AUTO COUNTDOWN) -->
<script>
// 👉 Next prediction time (set here)
const targetDate = new Date().getTime() + (1 * 60 * 60 * 1000); // 1 hour

setInterval(() => {
    const now = new Date().getTime();
    const diff = targetDate - now;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("days").innerText = days.toString().padStart(2, '0');
    document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
    document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
    document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
}, 1000);
</script>

</body>
</html>
